  <!-- Évite le flash blanc avant le montage de l'écran d'accueil (couleur de marque) -->
  <style>
    html, body, #root { background-color: #2d6a4f; }
    html.dark, html.dark body, html.dark #root { background-color: #0f1923; }
  </style>
  <script>
    (function () {
      try {
        var mql = window.matchMedia('(prefers-color-scheme: dark)');
        var readPref = function () {
          try { return localStorage.getItem('vdl_theme') || 'auto'; } catch (e) { return 'auto'; }
        };
        var apply = function () {
          var pref = readPref();
          var isDark = pref === 'dark' || (pref === 'auto' && mql.matches);
          document.documentElement.classList.toggle('dark', isDark);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', isDark ? '#0f1923' : '#2d6a4f');
        };
        window.__vdlApplyTheme = apply;
        apply();
        if (mql.addEventListener) mql.addEventListener('change', apply);
        else if (mql.addListener) mql.addListener(apply);
        window.addEventListener('storage', function (e) { if (e.key === 'vdl_theme') apply(); });
      } catch (e) {}
    })();
  </script>
</head>

  <body>
    <script>
      (function () {
        try {
          var FAMILIES = {
            defaut: "'Inter', system-ui, sans-serif",
            hyperlegible: "'Atkinson Hyperlegible', system-ui, sans-serif",
            lisible: "'Lexie Readable', system-ui, sans-serif",
            dyslexique: "'OpenDyslexic', 'Comic Sans MS', system-ui, sans-serif",
            ojuju: "'Ojuju', system-ui, sans-serif",
            "space-grotesk": "'Space Grotesk', system-ui, sans-serif",
            sora: "'Sora', system-ui, sans-serif",
            outfit: "'Outfit', system-ui, sans-serif"
          };
          var saved = localStorage.getItem('vdl_app_font') || 'defaut';
          var family = FAMILIES[saved] || FAMILIES.defaut;
          document.documentElement.style.setProperty('--app-font', family);
          document.documentElement.style.fontFamily = family;
        } catch (e) {}
      })();
    </script>
    <script>
      // Met à jour <html lang> et les balises hreflang en fonction de la route et de la langue choisie
      (function () {
        var ORIGIN = 'https://voal-mwebne-zidi.lovable.app';
        var LANGS = ['fr', 'zdj'];

        function readLang() {
          try {
            var raw = localStorage.getItem('vdl_lang');
            if (raw) {
              var v = raw.replace(/^"|"$/g, '');
              if (v === 'shi' || v === 'zdj') return 'zdj';
              if (v === 'fr') return 'fr';
            }
          } catch (e) {}
          return 'fr';
        }

        function updateHead() {
          var path = location.pathname + location.search.replace(/([?&])lang=[^&]*&?/, '$1').replace(/[?&]$/, '');
          document.documentElement.setAttribute('lang', readLang());
          // Nettoyer les anciens hreflang
          document.querySelectorAll('link[rel="alternate"][hreflang]').forEach(function (n) { n.parentNode.removeChild(n); });
          // Réinjecter pour la route courante
          LANGS.forEach(function (l) {
            var link = document.createElement('link');
            link.setAttribute('rel', 'alternate');
            link.setAttribute('hreflang', l);
            link.setAttribute('href', ORIGIN + path + (path.indexOf('?') >= 0 ? '&' : '?') + 'lang=' + l);
            document.head.appendChild(link);
          });
          var def = document.createElement('link');
          def.setAttribute('rel', 'alternate');
          def.setAttribute('hreflang', 'x-default');
          def.setAttribute('href', ORIGIN + path);
          document.head.appendChild(def);
        }

        updateHead();
        var _ps = history.pushState, _rs = history.replaceState;
        history.pushState = function () { var r = _ps.apply(this, arguments); updateHead(); return r; };
        history.replaceState = function () { var r = _rs.apply(this, arguments); updateHead(); return r; };
        window.addEventListener('popstate', updateHead);
        window.addEventListener('storage', function (e) { if (e.key === 'vdl_lang') updateHead(); });
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function () {
        var host = location.hostname;
        var isPreview = host.endsWith('lovableproject.com') || host.endsWith('lovable.app') || host === 'localhost' || host === '127.0.0.1';
        if ('serviceWorker' in navigator) {
          if (isPreview) {
            // En preview/dev : désactiver le SW pour éviter de servir des chunks Vite obsolètes
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              regs.forEach(function (r) { r.unregister(); });
            });
            if (window.caches && caches.keys) {
              caches.keys().then(function (keys) { keys.forEach(function (k) { caches.delete(k); }); });
            }
          } else {
            navigator.serviceWorker.register('/sw.js');
          }
        }
      })();
    </script>
  </body>
